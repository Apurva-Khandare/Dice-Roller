<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <style>
        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color:beige
        }

        .button{
            background-color: lightblue;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius:12px;
        }

        .button:hover{
            background-color: skyblue;
        }
    </style>
</head>
<body>
    <div class="container">
    <img src="./dice(1).png" alt="dice" height="200px" id="dice" />
    <br/><br/>
    <button class="button" type="button" onclick="rollDice()">Roll the Dice</button>
    </div>

    <script>
        const diceImg = document.getElementById("dice");
        function rollDice() {
            min=1;
            max=7;
            const randomNumber = Math.floor(Math.random() * (max-min)) + min;

            if(randomNumber === 1){
                diceImg.src = "./dice(1).png";
            }  else if(randomNumber === 2){
                diceImg.src = "./dice(2).png";
            }else if(randomNumber === 3){
                diceImg.src = "./dice(3).png";
            }else if(randomNumber === 4){
                diceImg.src = "./dice(4).png";
            }else if(randomNumber === 5){
                diceImg.src = "./dice(5).png";
            }else{
                diceImg.src = "./dice(6).png";
            }
        }

    </script>
    
</body>
</html>
